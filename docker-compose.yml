services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5068:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # SQLite file inside the container; persisted via volume below
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/taskmanager.db"
      # Override for real deployments, e.g. docker run -e JwtSettings__Key=...
      # JwtSettings__Key: "replace-with-at-least-32-chars-in-production"
    volumes:
      - taskmanager-db:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  taskmanager-db:
